<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420" role="img" aria-label="Dashboard wireframe exploration">
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#c8c7c0"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="760" height="420" fill="#eeeee8"/>
  <rect width="760" height="420" fill="url(#dots)"/>

  <!-- Top nav bar -->
  <rect x="20" y="20" width="720" height="44" fill="#e2e1db" stroke="#c0bfb8" stroke-width="1" rx="2"/>
  <!-- Logo placeholder -->
  <rect x="36" y="32" width="72" height="20" fill="#c8c7c0" rx="2"/>
  <!-- Nav items -->
  <rect x="500" y="36" width="44" height="12" fill="#d4d3cc" rx="2"/>
  <rect x="556" y="36" width="44" height="12" fill="#d4d3cc" rx="2"/>
  <rect x="612" y="30" width="112" height="24" fill="#b5822a" rx="2" fill-opacity="0.45"/>

  <!-- Left filter rail -->
  <rect x="20" y="80" width="168" height="320" fill="#e8e7e1" stroke="#c8c7c0" stroke-width="1" rx="2"/>
  <rect x="36" y="96" width="72" height="9" fill="#c8c7c0" rx="1"/>
  <rect x="36" y="116" width="136" height="1" fill="#d0cfc8"/>
  <rect x="36" y="128" width="120" height="10" fill="#d8d7d0" rx="2"/>
  <rect x="36" y="148" width="136" height="10" fill="#b5822a" rx="2" fill-opacity="0.35"/>
  <rect x="36" y="168" width="90" height="10" fill="#d8d7d0" rx="2"/>
  <rect x="36" y="188" width="110" height="10" fill="#d8d7d0" rx="2"/>
  <rect x="36" y="208" width="100" height="10" fill="#d8d7d0" rx="2"/>
  <rect x="36" y="236" width="72" height="9" fill="#c8c7c0" rx="1"/>
  <rect x="36" y="256" width="136" height="1" fill="#d0cfc8"/>
  <rect x="36" y="268" width="60" height="10" fill="#d8d7d0" rx="2"/>
  <rect x="36" y="288" width="80" height="10" fill="#d8d7d0" rx="2"/>
  <rect x="36" y="308" width="50" height="10" fill="#d8d7d0" rx="2"/>

  <!-- Main content area -->
  <rect x="204" y="80" width="536" height="320" fill="none" stroke="#c8c7c0" stroke-width="1" rx="2"/>

  <!-- Primary metric card -->
  <rect x="220" y="96" width="240" height="120" fill="#e4e3dd" stroke="#d0cfc8" stroke-width="1" rx="2"/>
  <rect x="236" y="112" width="88" height="8" fill="#c0bfb8" rx="1"/>
  <rect x="236" y="130" width="120" height="28" fill="#c8c7c0" rx="1"/>
  <!-- Trend line (sparkline) -->
  <polyline points="236,178 258,166 280,172 302,158 324,162 346,150 368,154 390,142 412,148 434,138 456,144" fill="none" stroke="#b5822a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <rect x="236" y="185" width="208" height="1" fill="#d0cfc8" opacity="0.5"/>

  <!-- Secondary metric card -->
  <rect x="476" y="96" width="248" height="120" fill="#e4e3dd" stroke="#d0cfc8" stroke-width="1" rx="2"/>
  <rect x="492" y="112" width="80" height="8" fill="#c0bfb8" rx="1"/>
  <rect x="492" y="130" width="100" height="28" fill="#c8c7c0" rx="1"/>
  <polyline points="492,178 514,174 536,168 558,175 580,162 602,158 624,165 646,155 668,161 690,150 706,155" fill="none" stroke="#b5822a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Feed entries -->
  <rect x="220" y="232" width="504" height="52" fill="#e8e7e1" stroke="#d0cfc8" stroke-width="1" rx="2"/>
  <rect x="236" y="246" width="160" height="8" fill="#c8c7c0" rx="1"/>
  <rect x="236" y="262" width="440" height="8" fill="#d4d3cc" rx="1"/>
  <rect x="236" y="276" width="320" height="8" fill="#d4d3cc" rx="1"/>

  <rect x="220" y="296" width="504" height="52" fill="#e8e7e1" stroke="#d0cfc8" stroke-width="1" rx="2"/>
  <rect x="236" y="310" width="120" height="8" fill="#c8c7c0" rx="1"/>
  <rect x="236" y="326" width="460" height="8" fill="#d4d3cc" rx="1"/>
  <rect x="236" y="340" width="280" height="8" fill="#d4d3cc" rx="1"/>

  <rect x="220" y="360" width="504" height="28" fill="#e4e3dd" stroke="#d0cfc8" stroke-width="1" rx="2" stroke-dasharray="4 3"/>
  <rect x="350" y="369" width="120" height="9" fill="#c8c7c0" rx="1"/>

  <!-- Annotation arrow -->
  <line x1="188" y1="148" x2="220" y2="148" stroke="#b5822a" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
  <circle cx="185" cy="148" r="3" fill="#b5822a" opacity="0.5"/>
  <text x="40" y="152" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#b5822a" opacity="0.7">active filter</text>
</svg>
